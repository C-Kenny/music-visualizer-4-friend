name: Release Build

on:
  push:
    # Project has used both `vX.Y.Z` (early tags) and bare `X.Y.Z` (2.3+)
    # via git-flow's default tag prefix being empty. Match both so a hotfix
    # like `2.4.1` triggers a release build.
    tags: ['v*', '[0-9]*']
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact: linux-amd64
            archive: tar.gz
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: windows-amd64
            archive: zip
          # macOS Intel (macos-13) dropped: Intel Macs EOL, runner queue
          # routinely exceeded 24h. Apple Silicon covers all current macOS users.
          - os: macos-latest      # Apple Silicon
            platform: macos
            arch: aarch64
            artifact: macos-aarch64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── Processing 4.5.2 ──────────────────────────────────────────────────
      # Processing 4.5.x ships a single launcher binary "Processing" that
      # dispatches to subcommands: `Processing cli --sketch=... --variant=X --export`.
      # There's no separate processing-java in 4.5.x. We export PROCESSING_BIN
      # for later steps to call.
      - name: Install Processing (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          wget -q https://github.com/processing/processing4/releases/download/processing-1313-4.5.2/processing-4.5.2-linux-x64-portable.zip -O p.zip
          unzip -q p.zip -d "$HOME"
          chmod +x "$HOME/Processing/bin/Processing"
          echo "PROCESSING_BIN=$HOME/Processing/bin/Processing" >> $GITHUB_ENV

      - name: Install Processing (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          curl -sL https://github.com/processing/processing4/releases/download/processing-1313-4.5.2/processing-4.5.2-windows-x64-portable.zip -o p.zip
          unzip -q p.zip -d "$HOME"
          echo "PROCESSING_BIN=$HOME/Processing/Processing.exe" >> $GITHUB_ENV

      - name: Install Processing (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            URL=https://github.com/processing/processing4/releases/download/processing-1313-4.5.2/processing-4.5.2-macos-aarch64-portable.zip
          else
            URL=https://github.com/processing/processing4/releases/download/processing-1313-4.5.2/processing-4.5.2-macos-x64-portable.zip
          fi
          curl -fsSL "$URL" -o p.zip
          # Fail fast if 404 returned an HTML body instead of a zip
          file p.zip | grep -qi zip || { echo "Download is not a zip:"; head -c 200 p.zip; exit 1; }
          unzip -q p.zip -d "$HOME"
          # Portable zip extracts Processing.app flat at $HOME (no wrapper dir)
          echo "PROCESSING_BIN=$HOME/Processing.app/Contents/MacOS/Processing" >> $GITHUB_ENV

      # ── Libraries (same bundled zips CI uses for smoke) ──────────────────
      # Processing 4 default sketchbook is OS-specific:
      #   Linux   → ~/sketchbook
      #   macOS   → ~/Documents/Processing
      #   Windows → ~/Documents/Processing
      # Libraries must live under <sketchbook>/libraries or Processing's CLI
      # fails the export with "No library found for …".
      - name: Install Processing libraries
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)   SKETCHBOOK_LIBS="$HOME/sketchbook/libraries" ;;
            macos|windows) SKETCHBOOK_LIBS="$HOME/Documents/Processing/libraries" ;;
          esac
          mkdir -p "$SKETCHBOOK_LIBS"
          for z in Music_Visualizer_CK/libraries/*.zip; do
            unzip -qo "$z" -d "$SKETCHBOOK_LIBS"
          done

      # ── Stage flat sketch dir (same shape as run.sh) ─────────────────────
      - name: Stage sketch
        shell: bash
        run: |
          BUILD=.build/Music_Visualizer_CK
          rm -rf .build && mkdir -p "$BUILD"
          cp Music_Visualizer_CK/*.pde "$BUILD/" 2>/dev/null || true
          cp Music_Visualizer_CK/src/core/*.pde "$BUILD/" 2>/dev/null || true
          cp Music_Visualizer_CK/src/scenes/*.pde "$BUILD/" 2>/dev/null || true
          cp Music_Visualizer_CK/src/scenes/games/*.pde "$BUILD/" 2>/dev/null || true
          cp Music_Visualizer_CK/src/fractals/*.pde "$BUILD/" 2>/dev/null || true
          cp -r Music_Visualizer_CK/data "$BUILD/data"
          cp -r Music_Visualizer_CK/libraries "$BUILD/libraries"
          [ -d Music_Visualizer_CK/code ] && cp -r Music_Visualizer_CK/code "$BUILD/code"
          # Strip dev-only runtime state that may have been committed by accident
          # (crash logs, admin tokens, scene prefs) — packaged builds start clean.
          rm -f "$BUILD/data/crash_log.txt" "$BUILD/data/crash_log.txt.old"
          rm -f "$BUILD"/.devadmintoken "$BUILD"/featureflags.json "$BUILD"/pins.json "$BUILD"/bans.json
          rm -f "$BUILD"/.scene_prefs "$BUILD"/.display "$BUILD"/scores.txt "$BUILD"/data/scores.txt
          # Bundle external resources INSIDE data/ so Processing's exporter
          # carries them into the per-OS app bundle. resourcePath() in
          # UserPaths.pde will find them at sketchPath("data/<x>") at runtime.
          # Only copy *used* media — full media/ is ~2.7GB (raw downloads,
          # zips, AI sample pack) but only ~25MB of cubemap dirs + the h3
          # emblem are referenced at runtime.
          mkdir -p "$BUILD/data/media/skyboxes"
          [ -f media/h3_emblem.jpg ] && cp media/h3_emblem.jpg "$BUILD/data/media/h3_emblem.jpg"
          for d in media/skyboxes/*/; do
            if [ -f "$d/px.png" ]; then
              cp -r "$d" "$BUILD/data/media/skyboxes/"
            fi
          done
          [ -d featureflags-ui ] && cp -r featureflags-ui "$BUILD/data/featureflags-ui"
          # Keep the legacy dev-layout symlink so sketchPath("../../media/...")
          # also resolves during the staging phase (used as a 4th-priority
          # fallback in resourcePath()).
          [ -d media ] && ln -sf "$PWD/media" "$BUILD/../media"

      # ── Export application ────────────────────────────────────────────────
      # Processing 4.5.2 CLI form: `Processing cli ... --variant=<plat-arch> --export`.
      # The `--platform` flag was removed in 4.0; --variant takes the combined
      # name (e.g. linux-amd64, windows-amd64, macos-x86_64, macos-aarch64).
      - name: Export application
        shell: bash
        run: |
          "$PROCESSING_BIN" cli \
            --sketch="$PWD/.build/Music_Visualizer_CK" \
            --output="$PWD/.export/Music_Visualizer_CK" \
            --variant=${{ matrix.platform }}-${{ matrix.arch }} \
            --force \
            --export

      # ── Package ──────────────────────────────────────────────────────────
      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd .export
          tar czf "../MusicVisualizer-${{ matrix.artifact }}.tar.gz" Music_Visualizer_CK

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd .export
          7z a "../MusicVisualizer-${{ matrix.artifact }}.zip" Music_Visualizer_CK >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: MusicVisualizer-${{ matrix.artifact }}
          path: MusicVisualizer-${{ matrix.artifact }}.*

      # ── Debian package (Linux only) ──────────────────────────────────────
      - name: Build .deb
        if: matrix.platform == 'linux' && matrix.arch == 'amd64'
        shell: bash
        run: |
          # Tag push (v2.4.2 or 2.4.2) → use the tag as the version.
          # Anything else (workflow_dispatch, branch push) → date+sha fallback.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          bash scripts/build-deb.sh .export/Music_Visualizer_CK "$VERSION"

      - name: Upload .deb artifact
        if: matrix.platform == 'linux' && matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: MusicVisualizer-deb
          path: dist/*.deb

      # ── Attach to GitHub Release on tag push ─────────────────────────────
      # Project uses both `vX.Y.Z` (early) and bare `X.Y.Z` (2.3+) tags, so
      # match any tag ref, not just `v*`.
      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MusicVisualizer-${{ matrix.artifact }}.*
            dist/*.deb

  # ══════════════════════════════════════════════════════════════════════════
  # Mirror release assets to GitLab + Codeberg.
  #
  # Pull-mirroring on the GitLab/Codeberg side already syncs git refs; this
  # job exists to copy the *binary release assets* (which only live on the
  # source forge's release API) to the mirrors so the project survives a
  # GH takedown without losing downloadable artifacts.
  #
  # No-op (skipped cleanly) if the corresponding secrets/vars are unset, so
  # this stays green for contributors / forks that haven't wired mirrors.
  # ══════════════════════════════════════════════════════════════════════════
  mirror-release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Mirror to GitLab
        if: vars.GITLAB_PROJECT_PATH != ''
        env:
          TOKEN: ${{ secrets.GITLAB_TOKEN }}
          PROJECT: ${{ vars.GITLAB_PROJECT_PATH }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "$TOKEN" ]; then
            echo "GITLAB_TOKEN secret not set — skipping GitLab mirror"
            exit 0
          fi
          # URL-encode the project path for the API
          PROJECT_ENC=$(echo -n "$PROJECT" | jq -sRr @uri)
          API="https://gitlab.com/api/v4/projects/$PROJECT_ENC"
          AUTH=(-H "PRIVATE-TOKEN: $TOKEN")

          # 1. Upload each asset, collect URLs
          ASSET_JSON='['
          first=1
          for f in release-assets/*; do
            name=$(basename "$f")
            echo "Uploading $name to GitLab…"
            resp=$(curl -sS "${AUTH[@]}" --fail \
              --form "file=@$f" "$API/uploads")
            url=$(echo "$resp" | jq -r .url)
            full="https://gitlab.com/$PROJECT$url"
            [ $first -eq 1 ] || ASSET_JSON+=','
            ASSET_JSON+=$(jq -n --arg n "$name" --arg u "$full" \
              '{name:$n, url:$u, link_type:"package"}')
            first=0
          done
          ASSET_JSON+=']'

          # 2. Create or update the release
          BODY=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
                       --arg desc "Mirror of github.com/${{ github.repository }} release $TAG" \
                       --argjson links "$ASSET_JSON" \
                       '{tag_name:$tag, name:$name, description:$desc, assets:{links:$links}}')
          # POST first; if already exists, PUT.
          code=$(curl -sS -o /tmp/r.json -w '%{http_code}' "${AUTH[@]}" \
            -H 'Content-Type: application/json' \
            -X POST "$API/releases" -d "$BODY")
          if [ "$code" = "409" ] || [ "$code" = "422" ]; then
            echo "Release exists, updating…"
            curl -sS --fail "${AUTH[@]}" -H 'Content-Type: application/json' \
              -X PUT "$API/releases/$TAG" -d "$BODY"
          elif [ "$code" -ge 300 ]; then
            echo "GitLab release create failed: $code"
            cat /tmp/r.json
            exit 1
          fi
          echo "GitLab release $TAG mirrored."

      - name: Mirror to Codeberg
        if: vars.CODEBERG_REPO_PATH != ''
        env:
          TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          REPO: ${{ vars.CODEBERG_REPO_PATH }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CODEBERG_TOKEN secret not set — skipping Codeberg mirror"
            exit 0
          fi
          API="https://codeberg.org/api/v1/repos/$REPO"
          AUTH=(-H "Authorization: token $TOKEN")

          # 1. Find or create the release. Forgejo needs the tag to exist on
          #    its side first — pull-mirror should have synced it, but allow
          #    a short retry window in case the poll hasn't fired yet.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/r.json -w '%{http_code}' "${AUTH[@]}" \
              "$API/tags/$TAG")
            [ "$code" = "200" ] && break
            echo "Tag $TAG not on Codeberg yet (try $i/5), waiting 30s…"
            sleep 30
          done
          if [ "$code" != "200" ]; then
            echo "Tag $TAG never appeared on Codeberg — pull-mirror likely not configured."
            exit 1
          fi

          BODY=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
                       --arg body "Mirror of github.com/${{ github.repository }} release $TAG" \
                       '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
          code=$(curl -sS -o /tmp/r.json -w '%{http_code}' "${AUTH[@]}" \
            -H 'Content-Type: application/json' \
            -X POST "$API/releases" -d "$BODY")
          if [ "$code" = "409" ]; then
            echo "Release exists, fetching id…"
            REL_ID=$(curl -sS "${AUTH[@]}" "$API/releases/tags/$TAG" | jq -r .id)
          elif [ "$code" -ge 300 ]; then
            echo "Codeberg release create failed: $code"
            cat /tmp/r.json
            exit 1
          else
            REL_ID=$(jq -r .id /tmp/r.json)
          fi

          # 2. Upload assets
          for f in release-assets/*; do
            name=$(basename "$f")
            echo "Uploading $name to Codeberg…"
            curl -sS --fail "${AUTH[@]}" \
              -F "attachment=@$f" \
              "$API/releases/$REL_ID/assets?name=$name" >/dev/null
          done
          echo "Codeberg release $TAG mirrored."
