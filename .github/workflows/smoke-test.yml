name: Smoke Test

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── Processing 4.5.2 ──────────────────────────────────────────────────
      - name: Cache Processing
        uses: actions/cache@v4
        id: cache-processing
        with:
          path: ~/Processing
          key: processing-4.5.2-linux-x64-v2

      - name: Install Processing 4.5.2
        if: steps.cache-processing.outputs.cache-hit != 'true'
        run: |
          # Processing 4.5.x ships portable .zip; top-level dir is "Processing/",
          # launcher at Processing/bin/Processing. run.sh invokes lowercase
          # "processing", so symlink to satisfy that.
          wget -q https://github.com/processing/processing4/releases/download/processing-1313-4.5.2/processing-4.5.2-linux-x64-portable.zip
          unzip -q processing-4.5.2-linux-x64-portable.zip -d ~/
          rm processing-4.5.2-linux-x64-portable.zip
          chmod +x ~/Processing/bin/Processing
          ln -sf Processing ~/Processing/bin/processing

      # ── Libraries ─────────────────────────────────────────────────────────
      - name: Cache Processing libraries
        uses: actions/cache@v4
        id: cache-libs
        with:
          path: ~/sketchbook/libraries
          key: processing-libs-v1

      - name: Install Processing libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: bash scripts/ci-install-libs.sh

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install display + OpenGL + audio (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: xvfb libgl1-mesa-dri libglu1-mesa pulseaudio gsettings-desktop-schemas
          version: v2

      - name: Start dummy audio sink
        # Minim/JavaSound throws on loadFile when no audio device exists.
        # Spin up pulseaudio with a null sink so the format probe succeeds.
        # `--start` forks and daemonizes; don't combine with --daemonize=false or `&`.
        run: |
          pulseaudio --start --exit-idle-time=-1
          # Wait until the daemon is actually accepting connections (up to 10s).
          for i in $(seq 1 20); do
            pactl info >/dev/null 2>&1 && break
            sleep 0.5
          done
          pactl load-module module-null-sink sink_name=dummy || true
          pactl list short sinks || true

      # ── Smoke test ────────────────────────────────────────────────────────
      - name: Run smoke test
        timeout-minutes: 4
        env:
          # QUICK mode: ~10 frames per scene instead of ~97. CI just needs to
          # prove every scene boots/draws/exits without throwing. Full input
          # matrix is exercised locally via the pre-push hook.
          SMOKETEST_QUICK: "1"
          # Belt-and-braces: avoid GLib aborting on missing GSettings schemas.
          GSETTINGS_BACKEND: "memory"
        run: |
          export PATH="$HOME/Processing/bin:$PATH"
          touch Music_Visualizer_CK/.smoketest
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          DISPLAY=:99 ./run.sh

      - name: Assert PASS
        run: |
          RESULT=$(head -1 .build/Music_Visualizer_CK/.smoketest_result 2>/dev/null || echo "MISSING")
          echo "Result: $RESULT"
          grep -q "^PASS$" .build/Music_Visualizer_CK/.smoketest_result

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoketest-result
          path: .build/Music_Visualizer_CK/.smoketest_result
          if-no-files-found: warn
