<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>Visualizer Controller</title>
<style>
  :root {
    --green:    #00ff78;
    --green-dim:#00b050;
    --bg:       #000000;
    --border:   rgba(0, 255, 120, 0.4);
    --glow:     0 0 4px rgba(0,255,120,0.7), 0 0 12px rgba(0,255,120,0.25);
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--green);
    font: 12px/1.4 "Courier New", "Consolas", monospace;
    text-shadow: var(--glow);
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  /* Interactive controls swallow gestures so single-finger drag drives them.
     Body is left as default so pinch-zoom + 2-finger pan still work. */
  .pad, .btn, .dbtn, .shoulder, .menubtn { touch-action: none; }
  body {
    display: flex;
    flex-direction: column;
  }
  .navbar {
    display: flex; align-items: center; gap: 0;
    background: var(--green); color: #000;
    border-bottom: 1px solid var(--border);
  }
  .navbar a {
    color: #000; text-decoration: none;
    padding: 6px 12px;
    font-weight: bold;
    letter-spacing: 0.15em;
    font-size: 11px;
    border-right: 1px solid rgba(0,0,0,0.3);
  }
  .navbar a.active { background: #000; color: var(--green); text-shadow: var(--glow); }
  .navbar .status {
    margin-left: auto; padding: 6px 10px;
    font-size: 10px; color: rgba(0,0,0,0.7);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .navbar .status.err { color: #c00; }

  /* Top bumper/trigger strip */
  .topbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
    padding: 4px;
    border-bottom: 1px solid var(--border);
  }
  .shoulder {
    border: 2px solid var(--green);
    background: var(--bg);
    color: var(--green);
    font: bold 14px "Courier New", monospace;
    text-shadow: var(--glow);
    padding: 8px 0;
    text-align: center;
    border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .shoulder:active, .shoulder.held {
    background: var(--green); color: #000; text-shadow: none;
    box-shadow: var(--glow);
  }

  /* Main grid — reflows by orientation. Regions: lstick, rstick, dpad, face, menu. */
  .layout {
    display: grid;
    gap: 6px;
    padding: 6px;
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;

    /* Portrait default: dpad/menu/face on top row, sticks fill bottom 2 rows */
    grid-template-areas:
      "dpad   menu    face"
      "lstick lstick  rstick"
      "lstick lstick  rstick";
    grid-template-columns: 1fr 0.55fr 1fr;
    grid-template-rows: minmax(110px, 0.9fr) 1fr 1fr;
  }
  /* Landscape (phones rotated, desktops): single row, sticks on outer edges */
  @media (orientation: landscape) {
    .layout {
      grid-template-areas: "lstick dpad menu face rstick";
      grid-template-columns: 1.4fr 1fr 0.45fr 1fr 1.4fr;
      grid-template-rows: 1fr;
    }
  }

  .region-lstick { grid-area: lstick; }
  .region-rstick { grid-area: rstick; }
  .region-dpad   { grid-area: dpad; }
  .region-face   { grid-area: face; }
  .region-menu   { grid-area: menu; }

  /* Stick pads */
  .pad {
    position: relative;
    border: 1px solid var(--border);
    background: rgba(0, 255, 120, 0.04);
    overflow: hidden;
    border-radius: 6px;
  }
  .pad-label {
    position: absolute; top: 4px; left: 6px;
    font-size: 10px; color: var(--green-dim);
    letter-spacing: 0.15em;
    pointer-events: none;
  }
  .pad-coord {
    position: absolute; bottom: 4px; right: 6px;
    font-size: 10px; color: var(--green-dim);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .crosshair-h, .crosshair-v {
    position: absolute; background: rgba(0,255,120,0.1);
    pointer-events: none;
  }
  .crosshair-h { left: 0; right: 0; top: 50%; height: 1px; }
  .crosshair-v { top: 0; bottom: 0; left: 50%; width: 1px; }
  .knob {
    position: absolute;
    width: 50px; height: 50px;
    border: 2px solid var(--green);
    border-radius: 50%;
    background: rgba(0, 255, 120, 0.15);
    box-shadow: var(--glow), inset 0 0 12px rgba(0,255,120,0.3);
    transform: translate(-50%, -50%);
    left: 50%; top: 50%;
    pointer-events: none;
    transition: transform 0.05s linear;
  }

  /* Face buttons (ABXY) — fills its grid region */
  .face {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
    padding: 8px;
    border: 1px solid var(--border);
    background: rgba(0, 255, 120, 0.04);
    border-radius: 6px;
    min-height: 0; min-width: 0;
  }
  .btn {
    border: 2px solid var(--green);
    background: var(--bg);
    color: var(--green);
    font: bold 20px "Courier New", monospace;
    text-shadow: var(--glow);
    cursor: pointer;
    border-radius: 50%;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex; align-items: center; justify-content: center;
    min-width: 0; min-height: 0;
    padding: 0;
  }
  .btn:active, .btn.held {
    background: var(--green); color: #000; text-shadow: none;
    box-shadow: var(--glow);
  }
  /* Xbox face: Y top, X left, B right, A bottom */
  #btnY { grid-column: 2; grid-row: 1; }
  #btnX { grid-column: 1; grid-row: 2; }
  #btnB { grid-column: 3; grid-row: 2; }
  #btnA { grid-column: 2; grid-row: 3; }

  /* D-pad — fills its grid region */
  .dpad {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
    padding: 8px;
    border: 1px solid var(--border);
    background: rgba(0, 255, 120, 0.04);
    border-radius: 6px;
    min-height: 0; min-width: 0;
  }
  .dbtn {
    border: 2px solid var(--green);
    background: var(--bg);
    color: var(--green);
    font: bold 18px "Courier New", monospace;
    text-shadow: var(--glow);
    cursor: pointer;
    border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex; align-items: center; justify-content: center;
    min-width: 0; min-height: 0;
    padding: 0;
  }
  .dbtn:active, .dbtn.held {
    background: var(--green); color: #000; text-shadow: none;
    box-shadow: var(--glow);
  }
  #dUp    { grid-column: 2; grid-row: 1; }
  #dLeft  { grid-column: 1; grid-row: 2; }
  #dRight { grid-column: 3; grid-row: 2; }
  #dDown  { grid-column: 2; grid-row: 3; }

  /* Center menu buttons (BACK/START) */
  .menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    justify-content: center;
    min-height: 0; min-width: 0;
  }
  @media (orientation: landscape) {
    .menu { flex-direction: column; }
  }
  .menubtn {
    border: 2px solid var(--green);
    background: var(--bg);
    color: var(--green);
    font: bold 10px "Courier New", monospace;
    text-shadow: var(--glow);
    padding: 6px 10px;
    border-radius: 12px;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.15em;
  }
  .menubtn:active, .menubtn.held {
    background: var(--green); color: #000; text-shadow: none;
    box-shadow: var(--glow);
  }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/">FLAGS</a>
  <a href="/controller.html" class="active">CONTROLLER</a>
  <span class="status" id="status">connecting…</span>
</nav>

<div class="topbar">
  <div class="shoulder" id="btnLT">LT</div>
  <div class="shoulder" id="btnLB">LB</div>
  <div class="shoulder" id="btnRB">RB</div>
  <div class="shoulder" id="btnRT">RT</div>
</div>

<div class="layout">
  <div class="pad region-lstick" id="padL">
    <div class="pad-label">L STICK</div>
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <div class="knob" id="knobL"></div>
    <div class="pad-coord" id="coordL">0.00, 0.00</div>
  </div>

  <div class="dpad region-dpad">
    <div class="dbtn" id="dUp">▲</div>
    <div class="dbtn" id="dLeft">◀</div>
    <div class="dbtn" id="dRight">▶</div>
    <div class="dbtn" id="dDown">▼</div>
  </div>

  <div class="menu region-menu">
    <div class="menubtn" id="btnBack">BACK</div>
    <div class="menubtn" id="btnStart">START</div>
  </div>

  <div class="face region-face">
    <button class="btn" id="btnY">Y</button>
    <button class="btn" id="btnX">X</button>
    <button class="btn" id="btnB">B</button>
    <button class="btn" id="btnA">A</button>
  </div>

  <div class="pad region-rstick" id="padR">
    <div class="pad-label">R STICK</div>
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <div class="knob" id="knobR"></div>
    <div class="pad-coord" id="coordR">0.00, 0.00</div>
  </div>
</div>

<script>
// Server substitutes __WS_PORT__ at request time; falls back to 8081 if served as static file.
const WS_PORT = ("__WS_PORT__".match(/^\d+$/) ? "__WS_PORT__" : "8081");
const WS_URL = "ws://" + (location.hostname || "127.0.0.1") + ":" + WS_PORT + "/controller";
const SEND_HZ = 60;
const statusEl = document.getElementById("status");

// ---- Identity: persistent clientId + nickname (localStorage) ----
function uuid() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}
let clientId = localStorage.getItem("vis.clientId");
if (!clientId) { clientId = uuid(); localStorage.setItem("vis.clientId", clientId); }
let nickname = localStorage.getItem("vis.nickname") || "";
if (!nickname) {
  nickname = (prompt("Nickname for the visualizer (shown to admin):") || "").trim().slice(0, 24);
  if (!nickname) nickname = "phone-" + clientId.slice(0, 4);
  localStorage.setItem("vis.nickname", nickname);
}

function readQuery(name) {
  const m = location.search.match(new RegExp("[?&]" + name + "=([^&]+)"));
  return m ? decodeURIComponent(m[1]) : null;
}
let pin = readQuery("pin") || localStorage.getItem("vis.pin") || "";
if (!pin) {
  pin = (prompt("Venue PIN (or your personal PIN like alice-XYZ123):") || "").trim();
}
if (pin) localStorage.setItem("vis.pin", pin);

// Cancelled-on-auth-loss timers — populated below. Without this, the 60Hz
// stick send keeps firing fetches between the alert() and the reload, hammering
// the server with rejected requests and racing the localStorage clear.
let stickSendTimer = null;
function clearPinAndReprompt(reason) {
  if (stickSendTimer) { clearInterval(stickSendTimer); stickSendTimer = null; }
  localStorage.removeItem("vis.pin");
  alert("PIN rejected (" + reason + "). Page will reload.");
  location.href = location.pathname;
}

async function buildHello() {
  let model = "";
  try {
    if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
      const h = await navigator.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
      model = h.model || "";
    }
  } catch (e) {}
  return {
    type: "hello",
    clientId, nickname, pin,
    ua: navigator.userAgent || "",
    platform: navigator.platform || "",
    model,
    screen: [window.innerWidth, window.innerHeight],
    dpr: window.devicePixelRatio || 1,
  };
}

// ---- Transport: WebSocket → falls back to HTTP POST after 2s ----
let ws = null;
let wsReady = false;
let mode = "ws-connecting";
let helloSent = false;

function connect() {
  helloSent = false;
  try { ws = new WebSocket(WS_URL); }
  catch (e) { enableHttpFallback("WS construct failed"); return; }
  const fallbackTimer = setTimeout(() => {
    if (!wsReady) { try { ws.close(); } catch (e) {} enableHttpFallback("WS timeout — 8081 likely blocked"); }
  }, 2000);
  ws.onopen = async () => {
    clearTimeout(fallbackTimer);
    wsReady = true; mode = "ws";
    const hello = await buildHello();
    try { ws.send(JSON.stringify(hello)); helloSent = true; } catch (e) {}
    statusEl.textContent = "WS · " + nickname + " · " + clientId.slice(0, 8);
    statusEl.className = "status";
  };
  ws.onmessage = (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === "hello-rejected") clearPinAndReprompt(m.reason || "rejected");
    } catch (e) {}
  };
  ws.onclose = () => {
    wsReady = false; helloSent = false;
    if (mode === "ws") { mode = "ws-connecting"; setTimeout(connect, 1000); }
  };
  ws.onerror = () => { wsReady = false; };
}
connect();

async function enableHttpFallback(reason) {
  if (mode === "http") return;
  mode = "http";
  statusEl.textContent = "HTTP · " + reason;
  const hello = await buildHello();
  try {
    const r = await fetch("/input/hello", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Client-Id": clientId },
      body: JSON.stringify(hello),
    });
    if (r.status === 403 || r.status === 401) {
      const j = await r.json().catch(() => ({}));
      clearPinAndReprompt(j.error || ("status " + r.status));
      return;
    } else if (!r.ok) {
      statusEl.textContent = "hello " + r.status + " @ " + location.host;
      statusEl.className = "status err";
      return;
    }
  } catch (e) {
    statusEl.textContent = "hello fail: " + e.message + " @ " + location.host;
    statusEl.className = "status err";
    return;
  }
  statusEl.textContent = "HTTP · " + nickname + " · " + clientId.slice(0, 8);
  statusEl.className = "status";
}

let sendCount = 0;
function send(obj) {
  if (mode === "ws") {
    if (wsReady && helloSent && ws.readyState === 1) {
      ws.send(JSON.stringify(obj));
      sendCount++;
    }
    return;
  }
  if (mode === "http") {
    let path = "/input/button";
    let body = obj;
    if (obj.type === "sticks")  { path = "/input/sticks";  body = { lx:obj.lx, ly:obj.ly, rx:obj.rx, ry:obj.ry }; }
    if (obj.type === "trigger") { path = "/input/trigger"; body = { which:obj.which, value:obj.value }; }
    if (obj.type === "button")  { path = "/input/button";  body = { btn:obj.btn, action:obj.action }; }
    fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Client-Id": clientId },
      body: JSON.stringify(body),
    }).then(r => {
      if (r.status === 401 || r.status === 403) {
        clearPinAndReprompt("server says " + r.status + " — PIN likely changed (visualizer restart?)");
      } else if (!r.ok) {
        statusEl.textContent = path + " → " + r.status; statusEl.className = "status err";
      } else { sendCount++; }
    })
      .catch(e => { statusEl.textContent = path + " err: " + e.message; statusEl.className = "status err"; });
  }
}

// ---- Sticks ----
const stickState = { L: {x:0, y:0, active:false}, R: {x:0, y:0, active:false} };

function setupPad(side, padEl, knobEl, coordEl) {
  let pointerId = null;

  function update(clientX, clientY) {
    const r = padEl.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    const radius = Math.min(r.width, r.height) / 2;
    let dx = (clientX - cx) / radius;
    let dy = (clientY - cy) / radius;
    const mag = Math.hypot(dx, dy);
    if (mag > 1) { dx /= mag; dy /= mag; }
    stickState[side].x = dx;
    stickState[side].y = dy;
    knobEl.style.left = (50 + dx * 50) + "%";
    knobEl.style.top  = (50 + dy * 50) + "%";
    coordEl.textContent = dx.toFixed(2) + ", " + dy.toFixed(2);
  }

  function release() {
    stickState[side].x = 0;
    stickState[side].y = 0;
    stickState[side].active = false;
    knobEl.style.left = "50%";
    knobEl.style.top  = "50%";
    coordEl.textContent = "0.00, 0.00";
    pointerId = null;
  }

  padEl.addEventListener("pointerdown", (e) => {
    pointerId = e.pointerId;
    padEl.setPointerCapture(pointerId);
    stickState[side].active = true;
    update(e.clientX, e.clientY);
  });
  padEl.addEventListener("pointermove", (e) => {
    if (e.pointerId !== pointerId) return;
    update(e.clientX, e.clientY);
  });
  padEl.addEventListener("pointerup",     () => release());
  padEl.addEventListener("pointercancel", () => release());
  padEl.addEventListener("pointerleave",  (e) => { if (e.pointerId === pointerId) release(); });
}

setupPad("L", document.getElementById("padL"), document.getElementById("knobL"), document.getElementById("coordL"));
setupPad("R", document.getElementById("padR"), document.getElementById("knobR"), document.getElementById("coordR"));

let lastSent = { lx:0, ly:0, rx:0, ry:0 };
stickSendTimer = setInterval(() => {
  const lx = stickState.L.x, ly = stickState.L.y;
  const rx = stickState.R.x, ry = stickState.R.y;
  const changed = lx !== lastSent.lx || ly !== lastSent.ly || rx !== lastSent.rx || ry !== lastSent.ry;
  const anyActive = stickState.L.active || stickState.R.active;
  if (changed || anyActive) {
    send({ type: "sticks", lx, ly, rx, ry });
    lastSent = { lx, ly, rx, ry };
  }
}, 1000 / SEND_HZ);

// ---- Buttons ----
function wireButton(id, name) {
  const el = document.getElementById(id);
  el.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    el.classList.add("held");
    send({ type: "button", btn: name, action: "down" });
  });
  function up() {
    el.classList.remove("held");
    send({ type: "button", btn: name, action: "up" });
  }
  el.addEventListener("pointerup", up);
  el.addEventListener("pointercancel", up);
  el.addEventListener("pointerleave", up);
}
// Face
wireButton("btnA", "A");
wireButton("btnB", "B");
wireButton("btnX", "X");
wireButton("btnY", "Y");
// Bumpers
wireButton("btnLB", "LB");
wireButton("btnRB", "RB");
// D-pad
wireButton("dUp",    "DUP");
wireButton("dDown",  "DDOWN");
wireButton("dLeft",  "DLEFT");
wireButton("dRight", "DRIGHT");
// Menu
wireButton("btnBack",  "BACK");
wireButton("btnStart", "START");

// ---- Triggers (digital: 0 / 1) ----
function wireTrigger(id, which) {
  const el = document.getElementById(id);
  el.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    el.classList.add("held");
    send({ type: "trigger", which, value: 1 });
  });
  function up() {
    el.classList.remove("held");
    send({ type: "trigger", which, value: 0 });
  }
  el.addEventListener("pointerup", up);
  el.addEventListener("pointercancel", up);
  el.addEventListener("pointerleave", up);
}
wireTrigger("btnLT", "L");
wireTrigger("btnRT", "R");
</script>
</body>
</html>
